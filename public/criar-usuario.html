<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Usuário | RH System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Cores originais mantidas: preto → dourado ── */
:root {
  --primary: #c4a264;
  --primary-dark: #080808;
  --primary-hover: #b08d50;
  --bg: #f3f4f6;
  --card: #ffffff;
  --border: #d1d5db;
  --text: #1f2937;
  --text-secondary: #4a5568;
  --muted: #6b7280;
  --success: #16a34a;
  --success-bg: #f0fdf4;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --warning: #d97706;
  --warning-bg: #fffbeb;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
  --radius: 14px;
  --radius-sm: 9px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "DM Sans", "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #000000 0%, #c59845 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 16px 40px;
  gap: 20px;
}

/* ── CARD GENÉRICO ── */
.card {
  width: 100%;
  max-width: 520px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  animation: fadeIn 0.35s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  padding: 22px 26px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-header h2 {
  color: #fff;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.2px;
}

.card-header .header-icon {
  font-size: 20px;
}

.card-body { padding: 24px 26px; }

/* ── ALERTA DE SEGURANÇA ── */
.security-alert {
  background: var(--warning-bg);
  border: 1px solid #fde68a;
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  font-size: 12.5px;
  color: var(--warning);
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 20px;
  line-height: 1.5;
}

/* ── FORMULÁRIO ── */
.field { margin-bottom: 16px; }

label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}

.input-wrap { position: relative; }
.input-wrap .input-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px; color: var(--muted); pointer-events: none;
}

input {
  width: 100%;
  padding: 10px 13px 10px 38px;
  font-size: 14px;
  font-family: "DM Sans", sans-serif;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: #fafafa;
  color: var(--text);
  transition: all 0.2s;
  outline: none;
}

input:focus {
  border-color: var(--primary);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(196,162,100,0.18);
}

input::placeholder { color: #b0b7c3; }

.toggle-senha {
  position: absolute; right: 11px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer; font-size: 14px;
  color: var(--muted); transition: color 0.2s;
}
.toggle-senha:hover { color: var(--primary); }

/* ── BOTÃO ── */
.btn-submit {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--primary) 0%, #a8884e 100%);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  font-family: "DM Sans", sans-serif;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}

.btn-submit:hover {
  background: linear-gradient(135deg, var(--primary-hover) 0%, #8a6e3a 100%);
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(196,162,100,0.35);
}

/* ── MSG RESULTADO ── */
.result-msg {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 10px 13px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 500;
  margin-top: 14px;
  animation: fadeIn 0.2s ease;
}
.result-msg.show { display: flex; }
.result-msg.success { background: var(--success-bg); color: var(--success); border: 1px solid #bbf7d0; }
.result-msg.error   { background: var(--danger-bg);  color: var(--danger);  border: 1px solid #fecaca; }

/* ── TABELA DE USUÁRIOS ── */
.card-usuarios { max-width: 520px; }

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  background: #f8fafc;
  border-bottom: 1px solid var(--border);
  text-align: left;
}

td {
  padding: 12px 14px;
  font-size: 13.5px;
  border-bottom: 1px solid #f0f4f8;
  vertical-align: middle;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: rgba(196,162,100,0.04); }

/* Senha oculta na tabela */
.senha-cell {
  display: flex;
  align-items: center;
  gap: 8px;
}

.senha-display {
  font-family: monospace;
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--muted);
}

.btn-toggle-senha {
  background: none; border: none;
  cursor: pointer; font-size: 14px;
  color: var(--muted); transition: color 0.2s;
  padding: 2px 4px; flex-shrink: 0;
}
.btn-toggle-senha:hover { color: var(--primary); }

/* Data formatada */
.date-cell { font-size: 12px; color: var(--muted); }

/* Loading */
.loading-row td { text-align: center; color: var(--muted); padding: 24px; font-size: 13px; }
</style>
</head>
<body>

<!-- ── CARD: CRIAR USUÁRIO ── -->
<div class="card">
  <div class="card-header">
    <span class="header-icon">👥</span>
    <h2>Criar Novo Usuário</h2>
  </div>

  <div class="card-body">

    <!--
      AVISO DE SEGURANÇA:
      As senhas são armazenadas em texto puro no banco de dados (sem hash).
      Para um ambiente de produção, recomenda-se usar bcrypt ou similar
      no backend (arquivo usuarios.js) antes de gravar no banco.
    -->
    <div class="security-alert">
      ⚠️ <span>As senhas são salvas sem criptografia. Evite senhas pessoais. Para produção, adicione hashing no backend.</span>
    </div>

    <form id="formUsuario" autocomplete="off">

      <div class="field">
        <label for="nome">Nome de usuário</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="nome" placeholder="Ex: joao.silva" autocomplete="off" required>
        </div>
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input type="password" id="senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
          <button type="button" class="toggle-senha" onclick="toggleSenha('senha', this)">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="btnCriar">Criar Usuário</button>

      <div class="result-msg" id="resultMsg">
        <span id="resultIcon"></span>
        <span id="resultText"></span>
      </div>

    </form>
  </div>
</div>

<!-- ── CARD: LISTA DE USUÁRIOS ── -->
<div class="card card-usuarios">
  <div class="card-header">
    <span class="header-icon">📋</span>
    <h2>Usuários Cadastrados</h2>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Nome</th>
        <th>Senha</th>
        <th>Criado em</th>
      </tr>
    </thead>
    <tbody id="listaUsuarios">
      <tr class="loading-row"><td colspan="4">Carregando…</td></tr>
    </tbody>
  </table>
</div>

<script>
/*
  GUARD DE LOGIN — descomente para ativar proteção por login.
*/
/*
const usuario = localStorage.getItem("usuario");
if (!usuario) { window.location.href = "login.html"; }
*/

/* ── Toggle senha (formulário) ── */
function toggleSenha(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === "password") {
    input.type = "text"; btn.textContent = "🙈";
  } else {
    input.type = "password"; btn.textContent = "👁️";
  }
}

/* ── Toggle senha (tabela) ── */
function toggleSenhaCelula(btn) {
  const display = btn.previousElementSibling;
  const senhaReal = btn.dataset.senha;
  if (btn.dataset.visible === "1") {
    display.textContent = "••••••••";
    btn.textContent = "👁️";
    btn.dataset.visible = "0";
  } else {
    display.textContent = senhaReal;
    btn.textContent = "🙈";
    btn.dataset.visible = "1";
  }
}

/* ── Lista usuários ── */
async function listarUsuarios() {
  const tbody = document.getElementById("listaUsuarios");
  try {
    const res      = await fetch("/api/usuarios");
    if (!res.ok) throw new Error();
    const usuarios = await res.json();

    tbody.innerHTML = usuarios.length
      ? usuarios.map(u => `
          <tr>
            <td style="color:var(--muted);font-size:12px;">${u.id}</td>
            <td><strong>${u.nome}</strong></td>
            <td>
              <div class="senha-cell">
                <span class="senha-display">••••••••</span>
                <button class="btn-toggle-senha" data-visible="0" data-senha="${u.senha.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}"
                  onclick="toggleSenhaCelula(this)">👁️</button>
              </div>
            </td>
            <td class="date-cell">${new Date(u.criado_em).toLocaleString("pt-BR")}</td>
          </tr>
        `).join("")
      : `<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--muted);">Nenhum usuário cadastrado</td></tr>`;

  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--danger);">Erro ao carregar usuários</td></tr>`;
  }
}

/* ── Criar usuário ── */
document.getElementById("formUsuario").addEventListener("submit", async (e) => {
  e.preventDefault();

  const btn  = document.getElementById("btnCriar");
  const msg  = document.getElementById("resultMsg");
  const icon = document.getElementById("resultIcon");
  const text = document.getElementById("resultText");

  msg.classList.remove("show", "success", "error");
  btn.textContent = "Criando…";
  btn.disabled = true;

  try {
    const res = await fetch("/api/usuarios", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        nome:  document.getElementById("nome").value,
        senha: document.getElementById("senha").value
      })
    });

    const data = await res.json();

    if (res.ok) {
      icon.textContent = "✓";
      text.textContent = "Usuário criado com sucesso!";
      msg.classList.add("show", "success");
      e.target.reset();
      listarUsuarios();
    } else {
      icon.textContent = "⚠️";
      text.textContent = data.error || "Erro ao criar usuário";
      msg.classList.add("show", "error");
    }
  } catch {
    icon.textContent = "⚠️";
    text.textContent = "Erro de conexão. Tente novamente.";
    msg.classList.add("show", "error");
  } finally {
    btn.textContent = "Criar Usuário";
    btn.disabled = false;
  }
});

/* ── Logout ── */
function logout() {
  localStorage.removeItem("usuario");
  window.location.href = "login.html";
}

listarUsuarios();
</script>

</body>
</html>
