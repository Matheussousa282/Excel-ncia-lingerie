<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrevistas | RH System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0f62fe;
  --primary-light: #eef3ff;
  --accent: #ff6b35;
  --bg: #f5f7fa;
  --card: #ffffff;
  --text: #0d1117;
  --text-secondary: #4a5568;
  --muted: #8a94a6;
  --border: #e2e8f0;
  --success: #0da868;
  --success-bg: #e6f7f1;
  --info-bg: #eef3ff;
  --warning: #d4a017;
  --warning-bg: #fef9e7;
  --danger: #e53e3e;
  --danger-bg: #fef2f2;
  --approved: #7c3aed;
  --approved-bg: #f5f3ff;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.09);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.15);
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.main { max-width: 1350px; margin: 0 auto; padding: 26px 22px; }

.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 22px; gap: 14px; flex-wrap: wrap; }
.page-title  { font-size: 22px; font-weight: 700; letter-spacing: -.4px; }
.page-subtitle { font-size: 13px; color: var(--muted); margin-top: 3px; }

/* ── TABS ── */
.tabs { display: flex; gap: 4px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px; margin-bottom: 22px; box-shadow: var(--shadow-sm); width: fit-content; }
.tab { padding: 8px 18px; border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 600; cursor: pointer; border: none; background: none; font-family: "DM Sans", sans-serif; color: var(--muted); transition: all .18s; }
.tab.active { background: var(--primary); color: #fff; }
.tab:not(.active):hover { background: var(--bg); color: var(--text); }

/* ── CARDS ── */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(148px,1fr)); gap: 14px; margin-bottom: 22px; }
.card { background: var(--card); padding: 18px; border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--border); position: relative; overflow: hidden; transition: box-shadow .2s, transform .2s; }
.card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.card-icon { position: absolute; top: 14px; right: 14px; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.card-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 5px; }
.card-value { font-size: 28px; font-weight: 700; font-family: "DM Mono", monospace; line-height: 1; }

/* ══ KANBAN ══ */
.kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.kanban-col { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); display: flex; flex-direction: column; overflow: hidden; }
.kanban-header { padding: 12px 15px; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.kanban-count  { font-family: "DM Mono",monospace; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 700; }
.col-agendada  .kanban-header { background: var(--warning-bg); color: #92650a; }
.col-agendada  .kanban-count  { background: #fde68a; color: #92650a; }
.col-realizada .kanban-header { background: var(--info-bg); color: var(--primary); }
.col-realizada .kanban-count  { background: #bfdbfe; color: var(--primary); }
.col-aprovado  .kanban-header { background: var(--approved-bg); color: var(--approved); }
.col-aprovado  .kanban-count  { background: #ddd6fe; color: var(--approved); }
.col-reprovado .kanban-header { background: var(--danger-bg); color: var(--danger); }
.col-reprovado .kanban-count  { background: #fecaca; color: var(--danger); }
.kanban-body { padding: 10px; flex: 1; min-height: 70px; display: flex; flex-direction: column; gap: 8px; }

.cand-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 13px; transition: all .18s; }
.cand-card:hover { box-shadow: var(--shadow-md); border-color: #c7d2fe; }
.cand-header { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 7px; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,#0f62fe,#5b9cf6); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; text-transform: uppercase; }
.avatar-adm   { background: linear-gradient(135deg,#0da868,#34d399); }
.avatar-aprov { background: linear-gradient(135deg,#7c3aed,#a78bfa); }
.cand-nome  { font-size: 13px; font-weight: 600; }
.cand-cargo { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
.cand-data-hora { font-size: 11.5px; color: var(--primary); background: var(--primary-light); border-radius: 5px; padding: 3px 8px; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 9px; font-weight: 500; }
.cand-actions { display: flex; gap: 5px; flex-wrap: wrap; }
.btn-mini { padding: 4px 9px; border-radius: 5px; font-size: 11.5px; font-weight: 600; font-family: "DM Sans",sans-serif; cursor: pointer; border: none; transition: all .15s; }
.btn-realizada { background: var(--info-bg); color: var(--primary); }
.btn-realizada:hover { background: #dde7ff; }
.btn-aprovado  { background: var(--approved-bg); color: var(--approved); }
.btn-aprovado:hover  { background: #ede9fe; }
.btn-reprovado { background: var(--danger-bg); color: var(--danger); }
.btn-reprovado:hover { background: #fecaca; }
.btn-cancelar  { background: #f3f4f6; color: var(--muted); }
.btn-cancelar:hover  { background: #e5e7eb; color: var(--danger); }
.empty-col { padding: 18px 10px; text-align: center; color: var(--muted); font-size: 12.5px; }

/* ══ CALENDÁRIO ══ */
.cal-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.cal-nav { display: flex; align-items: center; gap: 8px; }
.btn-nav { width: 34px; height: 34px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--card); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all .18s; }
.btn-nav:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.cal-mes-ano { font-size: 16px; font-weight: 700; min-width: 180px; text-align: center; letter-spacing: -.2px; }

.cal-select-mes { padding: 7px 32px 7px 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--card); font-size: 13.5px; font-family: "DM Sans",sans-serif; color: var(--text); cursor: pointer; outline: none; appearance: none; background-image: url("data:image/svg+xml,%3Csvg fill='none' stroke='%236b7280' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 9l-7 7-7-7'%3E%3C/path%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 9px center; background-size: 14px; transition: border-color .2s; }
.cal-select-mes:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15,98,254,.1); }
.cal-select-ano { padding: 7px 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--card); font-size: 13.5px; font-family: "DM Mono",monospace; color: var(--text); outline: none; width: 88px; text-align: center; transition: border-color .2s; }
.cal-select-ano:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15,98,254,.1); }

.cal-grid { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; }
.cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); border-bottom: 1px solid var(--border); }
.cal-weekday { padding: 10px 6px; text-align: center; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; background: #f8fafc; }
.cal-weekday.weekend { color: var(--accent); }
.cal-days { display: grid; grid-template-columns: repeat(7,1fr); }

.cal-day { min-height: 96px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 6px; transition: background .15s; position: relative; }
.cal-day:nth-child(7n) { border-right: none; }
.cal-day.outro-mes .cal-day-num span { color: #d1d5db; }
.cal-day.hoje { background: #f0f7ff; }
.cal-day.hoje .cal-day-num span { color: var(--primary); font-weight: 700; }
.cal-day.tem-entrevista:hover { background: #f0f7ff; cursor: pointer; }
.cal-day:not(.passado):hover .btn-agendar-dia { display: flex; }

.cal-day-num { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
.btn-agendar-dia { display: none; width: 18px; height: 18px; border-radius: 4px; background: var(--primary); color: #fff; border: none; font-size: 13px; cursor: pointer; align-items: center; justify-content: center; font-weight: 700; }
.btn-agendar-dia:hover { background: #0353e9; }

.cal-evento { padding: 3px 6px; border-radius: 4px; font-size: 10.5px; font-weight: 600; margin-bottom: 3px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; cursor: pointer; transition: opacity .15s; line-height: 1.4; }
.cal-evento:hover { opacity: .82; }
.cal-evento.agendada  { background: var(--warning-bg); color: #92650a; border-left: 3px solid var(--warning); }
.cal-evento.realizada { background: var(--info-bg); color: var(--primary); border-left: 3px solid var(--primary); }
.cal-evento.aprovado  { background: var(--approved-bg); color: var(--approved); border-left: 3px solid var(--approved); }
.cal-evento.reprovado { background: var(--danger-bg); color: var(--danger); border-left: 3px solid var(--danger); }

/* Lista do mês */
.lista-mes { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); margin-top: 16px; overflow: hidden; }
.lista-mes-header { padding: 13px 18px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 700; background: #f8fafc; display: flex; align-items: center; justify-content: space-between; }
.lista-item { display: grid; grid-template-columns: 130px 1fr 1fr auto; gap: 12px; padding: 12px 18px; align-items: center; border-bottom: 1px solid #f0f4f8; transition: background .15s; cursor: pointer; }
.lista-item:last-child { border-bottom: none; }
.lista-item:hover { background: #f8fbff; }
.lista-data-hora { font-size: 12.5px; font-weight: 600; color: var(--primary); }
.lista-data-dia  { font-size: 11px; color: var(--muted); margin-top: 1px; }
.lista-nome  { font-size: 13.5px; font-weight: 600; }
.lista-cargo { font-size: 12px; color: var(--muted); margin-top: 1px; }
.lista-resp  { font-size: 12.5px; color: var(--text-secondary); }
.badge-status { padding: 3px 10px; border-radius: 12px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
.badge-agendada  { background: var(--warning-bg); color: #92650a; }
.badge-realizada { background: var(--info-bg); color: var(--primary); }
.badge-aprovado  { background: var(--approved-bg); color: var(--approved); }
.badge-reprovado { background: var(--danger-bg); color: var(--danger); }

.empty-cal { padding: 40px; text-align: center; color: var(--muted); }
.empty-cal-icon { font-size: 36px; margin-bottom: 10px; }

/* ══ MODAIS ══ */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(3px); }
.modal-overlay.open { display: flex; animation: fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal-box { background: var(--card); padding: 24px 26px; border-radius: 16px; max-width: 510px; width: 94%; box-shadow: var(--shadow-lg); animation: slideUp .22s ease; max-height: 90vh; overflow-y: auto; }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
.modal-title { font-size: 17px; font-weight: 700; }
.modal-subtitle { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
.modal-close { width: 28px; height: 28px; border-radius: 7px; border: none; background: var(--bg); font-size: 16px; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
.modal-close:hover { background: var(--danger-bg); color: var(--danger); }

.mfield { margin-bottom: 15px; }
.mfield label { display: block; font-size: 11.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
.mfield input, .mfield select, .mfield textarea { width: 100%; padding: 9px 12px; font-size: 13.5px; font-family: "DM Sans",sans-serif; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; transition: all .2s; }
.mfield input:focus, .mfield select:focus, .mfield textarea:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(15,98,254,.1); }
.mfield select { appearance: none; background-image: url("data:image/svg+xml,%3Csvg fill='none' stroke='%236b7280' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 9l-7 7-7-7'%3E%3C/path%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 10px center; background-size:14px; padding-right:32px; cursor:pointer; }
.mfield textarea { resize: vertical; min-height: 72px; }

/* Horários */
.horarios-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-top: 4px; }
.btn-horario { padding: 8px 4px; border-radius: 7px; font-size: 12px; font-weight: 600; font-family: "DM Mono",monospace; cursor: pointer; border: 1.5px solid var(--border); background: var(--bg); color: var(--text-secondary); transition: all .15s; text-align: center; line-height: 1.3; }
.btn-horario:hover:not(.ocupado) { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
.btn-horario.selecionado { border-color: var(--primary); background: var(--primary); color: #fff; }
.btn-horario.ocupado { opacity: .4; cursor: not-allowed; background: #f3f4f6; }

.btn-confirmar { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14.5px; font-weight: 700; font-family: "DM Sans",sans-serif; cursor: pointer; transition: all .2s; margin-top: 6px; }
.btn-confirmar:hover { background: #0353e9; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(15,98,254,.3); }
.btn-confirmar:disabled { opacity: .6; pointer-events: none; }

/* Detalhe */
.detalhe-row { display: flex; gap: 10px; margin-bottom: 13px; align-items: flex-start; }
.detalhe-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.detalhe-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.detalhe-valor { font-size: 14px; font-weight: 500; margin-top: 2px; }
.detalhe-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 15px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; font-family: "DM Sans",sans-serif; border: none; cursor: pointer; transition: all .18s; }
.btn-success-sm { background: var(--success-bg); color: var(--success); }
.btn-success-sm:hover { background: #c8f0e0; }
.btn-danger-sm { background: var(--danger-bg); color: var(--danger); }
.btn-danger-sm:hover { background: #fecaca; }
.btn-outline { background: var(--card); color: var(--text-secondary); border: 1.5px solid var(--border); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-primary-main { background: var(--primary); color: #fff; }
.btn-primary-main:hover { background: #0353e9; }

/* Toast */
.toast { position: fixed; bottom: 22px; right: 22px; background: #1a202c; color: #fff; padding: 11px 18px; border-radius: 10px; font-size: 13.5px; font-weight: 500; box-shadow: var(--shadow-lg); z-index: 99999; transform: translateY(70px); opacity: 0; transition: all .3s ease; }
.toast.show   { transform: translateY(0); opacity: 1; }
.toast.success { background: var(--success); }
.toast.danger  { background: var(--danger); }
.toast.warning { background: var(--warning); }

@media (max-width:900px) { .kanban { grid-template-columns: repeat(2,1fr); } }
@media (max-width:600px) { .kanban { grid-template-columns: 1fr; } .horarios-grid { grid-template-columns: repeat(3,1fr); } .lista-item { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="main">

  <div class="page-header">
    <div>
      <div class="page-title">🎯 Entrevistas</div>
      <div class="page-subtitle">Pipeline e calendário de agendamentos</div>
    </div>
    <button class="btn btn-primary-main" onclick="abrirModalAgendar()">+ Agendar entrevista</button>
  </div>

  <!-- Cards resumo -->
  <div class="cards" id="cardsResumo"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="mostrarSecao('kanban',this)">📋 Pipeline</button>
    <button class="tab" onclick="mostrarSecao('calendario',this)">📅 Calendário</button>
  </div>

  <!-- Seção kanban -->
  <div id="secao-kanban">
    <div class="kanban" id="kanbanBoard"></div>
  </div>

  <!-- Seção calendário -->
  <div id="secao-calendario" style="display:none;">
    <div class="cal-toolbar">
      <div class="cal-nav">
        <button class="btn-nav" onclick="navegarMes(-1)">‹</button>
        <div class="cal-mes-ano" id="calMesAno">—</div>
        <button class="btn-nav" onclick="navegarMes(1)">›</button>
      </div>
      <select class="cal-select-mes" id="selectMes" onchange="aplicarSelecao()">
        <option value="0">Janeiro</option><option value="1">Fevereiro</option>
        <option value="2">Março</option><option value="3">Abril</option>
        <option value="4">Maio</option><option value="5">Junho</option>
        <option value="6">Julho</option><option value="7">Agosto</option>
        <option value="8">Setembro</option><option value="9">Outubro</option>
        <option value="10">Novembro</option><option value="11">Dezembro</option>
      </select>
      <input type="number" class="cal-select-ano" id="inputAno" min="2020" max="2040" onchange="aplicarSelecao()">
      <button class="btn btn-outline" onclick="irHoje()" style="font-size:13px;padding:7px 14px;">Hoje</button>
    </div>
    <div class="cal-grid" id="calGrade"></div>
    <div class="lista-mes" id="listaMes">
      <div class="lista-mes-header">
        <span>📋 Entrevistas do mês</span>
        <span class="badge-status badge-agendada" id="countMes">0 entrevistas</span>
      </div>
      <div id="listaMesBody"></div>
    </div>
  </div>
</div>

<!-- Modal: Agendar -->
<div class="modal-overlay" id="modalAgendar">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-title">📅 Agendar Entrevista</div>
        <div class="modal-subtitle">Selecione candidato, data e horário</div>
      </div>
      <button class="modal-close" onclick="fecharModal('modalAgendar')">&times;</button>
    </div>

    <div class="mfield">
      <label>Candidato *</label>
      <select id="selectCand"><option value="">Carregando…</option></select>
    </div>
    <div class="mfield">
      <label>Data *</label>
      <input type="date" id="dataAgendar" onchange="carregarHorarios()">
    </div>
    <div class="mfield">
      <label>Horário disponível *</label>
      <div class="horarios-grid" id="horariosGrid">
        <div style="grid-column:span 4;color:var(--muted);font-size:13px;padding:6px 0;">
          Selecione uma data primeiro
        </div>
      </div>
    </div>
    <div class="mfield">
      <label>Responsável pela entrevista</label>
      <input type="text" id="respAgendar" placeholder="Nome do entrevistador…">
    </div>
    <div class="mfield">
      <label>Observações</label>
      <textarea id="obsAgendar" placeholder="Anotações…"></textarea>
    </div>
    <button class="btn-confirmar" id="btnConfirmar" onclick="confirmarAgendamento()">✓ Confirmar Agendamento</button>
  </div>
</div>

<!-- Modal: Detalhe -->
<div class="modal-overlay" id="modalDetalhe">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="detTitulo"></div>
        <div class="modal-subtitle" id="detSub"></div>
      </div>
      <button class="modal-close" onclick="fecharModal('modalDetalhe')">&times;</button>
    </div>
    <div id="detConteudo"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── Estado global ── */
let todasEntrevistas = [];
let candidatos       = [];
let calAtual         = new Date();
let horarioSel       = null;

const HORARIOS  = ["08:00","08:30","09:00","09:30","10:00","10:30","11:00","11:30",
                   "13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30"];
const MESES_PT  = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
                   "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

/* ════ INICIALIZAÇÃO ════ */
async function inicializar() {
  await Promise.all([buscarCandidatos(), buscarTodasEntrevistas()]);
  renderCards();
  renderKanban();
}

async function buscarCandidatos() {
  try {
    const r = await fetch("/api/candidatos");
    const todos = await r.json();
    candidatos = todos.filter(c => !c.aprovado);
    const sel = document.getElementById("selectCand");
    sel.innerHTML = '<option value="">Selecione…</option>' +
      candidatos.map(c => `<option value="${c.id}">${c.nome} — ${c.cargo}/${c.unidade}</option>`).join("");
  } catch(e) { console.error(e); }
}

async function buscarTodasEntrevistas() {
  try {
    const r = await fetch("/api/entrevistas");
    todasEntrevistas = await r.json();
  } catch(e) { console.error(e); todasEntrevistas = []; }
}

async function buscarEntrevistasMes(mes, ano) {
  try {
    const r = await fetch(`/api/entrevistas?mes=${mes}&ano=${ano}`);
    return await r.json();
  } catch(e) { return []; }
}

/* ════ CARDS RESUMO ════ */
function renderCards() {
  const c = { agendada:0, realizada:0, aprovado:0, reprovado:0 };
  todasEntrevistas.forEach(e => { if(c[e.status]!==undefined) c[e.status]++; });
  document.getElementById("cardsResumo").innerHTML = `
    <div class="card" style="border-left:4px solid var(--primary);">
      <div class="card-icon" style="background:var(--info-bg);">📋</div>
      <div class="card-label">Total</div>
      <div class="card-value" style="color:var(--primary);">${todasEntrevistas.length}</div>
    </div>
    <div class="card" style="border-left:4px solid var(--warning);">
      <div class="card-icon" style="background:var(--warning-bg);">⏳</div>
      <div class="card-label">Agendadas</div>
      <div class="card-value" style="color:var(--warning);">${c.agendada}</div>
    </div>
    <div class="card" style="border-left:4px solid var(--primary);">
      <div class="card-icon" style="background:var(--info-bg);">📝</div>
      <div class="card-label">Realizadas</div>
      <div class="card-value" style="color:var(--primary);">${c.realizada}</div>
    </div>
    <div class="card" style="border-left:4px solid var(--success);">
      <div class="card-icon" style="background:var(--success-bg);">✅</div>
      <div class="card-label">Aprovados</div>
      <div class="card-value" style="color:var(--success);">${c.aprovado}</div>
    </div>
    <div class="card" style="border-left:4px solid var(--danger);">
      <div class="card-icon" style="background:var(--danger-bg);">✕</div>
      <div class="card-label">Reprovados</div>
      <div class="card-value" style="color:var(--danger);">${c.reprovado}</div>
    </div>`;
}

/* ════ KANBAN ════ */
function renderKanban() {
  const cols = {
    agendada:  { label:"⏳ Agendadas",  cls:"col-agendada",  items:[] },
    realizada: { label:"📝 Realizadas", cls:"col-realizada", items:[] },
    aprovado:  { label:"✅ Aprovados",  cls:"col-aprovado",  items:[] },
    reprovado: { label:"✕ Reprovados", cls:"col-reprovado", items:[] },
  };
  todasEntrevistas.forEach(e => { if(cols[e.status]) cols[e.status].items.push(e); });

  document.getElementById("kanbanBoard").innerHTML = Object.entries(cols).map(([k,col]) => `
    <div class="kanban-col ${col.cls}">
      <div class="kanban-header">${col.label}<span class="kanban-count">${col.items.length}</span></div>
      <div class="kanban-body">
        ${col.items.length ? col.items.map(e => cardKanban(e, k)).join("") : '<div class="empty-col">Nenhuma</div>'}
      </div>
    </div>`).join("");
}

function cardKanban(e, status) {
  const ini = e.candidato_nome.split(" ").slice(0,2).map(n=>n[0]).join("");
  const dt  = new Date(e.data_hora);
  const dtStr = dt.toLocaleDateString("pt-BR") + " " +
    dt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  const avCls = status === "aprovado" ? "avatar-aprov" : (e.cargo !== "TI" ? "avatar-adm" : "");

  const botoes = {
    agendada:  `<button class="btn-mini btn-realizada" onclick="mudarStatus(${e.id},'realizada')">📝 Realizada</button>
                <button class="btn-mini btn-cancelar"  onclick="excluir(${e.id})">🗑</button>`,
    realizada: `<button class="btn-mini btn-aprovado"  onclick="mudarStatus(${e.id},'aprovado')">✅ Aprovar</button>
                <button class="btn-mini btn-reprovado" onclick="mudarStatus(${e.id},'reprovado')">✕ Reprovar</button>`,
    aprovado:  ``,
    reprovado: `<button class="btn-mini btn-cancelar"  onclick="excluir(${e.id})">🗑 Remover</button>`,
  }[status] || "";

  return `<div class="cand-card">
    <div class="cand-header">
      <div class="avatar ${avCls}">${ini}</div>
      <div><div class="cand-nome">${e.candidato_nome}</div><div class="cand-cargo">${e.cargo} • ${e.unidade}</div></div>
    </div>
    <div class="cand-data-hora">📅 ${dtStr}</div>
    ${e.responsavel ? `<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">👤 ${e.responsavel}</div>` : ""}
    <div class="cand-actions">${botoes}</div>
  </div>`;
}

/* ════ CALENDÁRIO ════ */
async function renderCalendario() {
  const ano = calAtual.getFullYear();
  const mes = calAtual.getMonth(); // 0-based
  document.getElementById("calMesAno").textContent = `${MESES_PT[mes]} ${ano}`;
  document.getElementById("selectMes").value = mes;
  document.getElementById("inputAno").value  = ano;

  const entrevistas = await buscarEntrevistasMes(mes + 1, ano);
  const hoje = new Date();

  const primeiroDia    = new Date(ano, mes, 1).getDay();
  const ultimoDia      = new Date(ano, mes + 1, 0).getDate();
  const ultimoDiaAntes = new Date(ano, mes, 0).getDate();

  // Cabeçalho
  const dias = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  let html = '<div class="cal-weekdays">' +
    dias.map((d,i)=>`<div class="cal-weekday ${i===0||i===6?"weekend":""}">${d}</div>`).join("") +
    '</div><div class="cal-days">';

  // Dias do mês anterior
  for (let i = primeiroDia - 1; i >= 0; i--) {
    html += `<div class="cal-day outro-mes"><div class="cal-day-num"><span>${ultimoDiaAntes - i}</span></div></div>`;
  }

  // Dias do mês
  for (let d = 1; d <= ultimoDia; d++) {
    const dataStr = `${ano}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const eHoje   = hoje.getFullYear()===ano && hoje.getMonth()===mes && hoje.getDate()===d;
    const ePassado = new Date(ano,mes,d) < new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate());

    const dodia = entrevistas.filter(e => {
      const dt = new Date(e.data_hora);
      return dt.getDate()===d && dt.getMonth()===mes && dt.getFullYear()===ano;
    });

    const cls = ["cal-day",
      eHoje ? "hoje" : "",
      ePassado ? "passado" : "",
      dodia.length ? "tem-entrevista" : ""
    ].filter(Boolean).join(" ");

    const eventos = dodia.map(e => {
      const hr = new Date(e.data_hora).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
      return `<div class="cal-evento ${e.status}" onclick='abrirDetalhe(${JSON.stringify(e).replace(/'/g,"&#39;")})'>
        ${hr} ${e.candidato_nome.split(" ")[0]}
      </div>`;
    }).join("");

    html += `<div class="${cls}">
      <div class="cal-day-num">
        <span>${d}</span>
        ${!ePassado ? `<button class="btn-agendar-dia" onclick="abrirModalAgendarDia('${dataStr}')" title="Agendar">+</button>` : ""}
      </div>
      ${eventos}
    </div>`;
  }

  // Completar grade
  const total = primeiroDia + ultimoDia;
  const faltam = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= faltam; i++) {
    html += `<div class="cal-day outro-mes"><div class="cal-day-num"><span>${i}</span></div></div>`;
  }
  html += '</div>';
  document.getElementById("calGrade").innerHTML = html;

  // Lista do mês
  renderListaMes(entrevistas, mes, ano);
}

function renderListaMes(lista, mes, ano) {
  document.getElementById("countMes").textContent = `${lista.length} entrevista${lista.length!==1?"s":""}`;
  const body = document.getElementById("listaMesBody");
  if (!lista.length) {
    body.innerHTML = `<div class="empty-cal"><div class="empty-cal-icon">📭</div><div>Nenhuma entrevista em ${MESES_PT[mes]} ${ano}</div></div>`;
    return;
  }
  body.innerHTML = lista.map(e => {
    const dt  = new Date(e.data_hora);
    const hr  = dt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    const dia = dt.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"2-digit"});
    return `<div class="lista-item" onclick='abrirDetalhe(${JSON.stringify(e).replace(/'/g,"&#39;")})'>
      <div><div class="lista-data-hora">🕐 ${hr}</div><div class="lista-data-dia">${dia}</div></div>
      <div><div class="lista-nome">${e.candidato_nome}</div><div class="lista-cargo">${e.cargo} • ${e.unidade}</div></div>
      <div class="lista-resp">${e.responsavel ? "👤 "+e.responsavel : "—"}</div>
      <span class="badge-status badge-${e.status}">${labelSt(e.status)}</span>
    </div>`;
  }).join("");
}

function labelSt(s) {
  return {agendada:"⏳ Agendada",realizada:"📝 Realizada",aprovado:"✅ Aprovado",reprovado:"✕ Reprovado"}[s]||s;
}

function navegarMes(d) { calAtual.setMonth(calAtual.getMonth()+d); renderCalendario(); }
function irHoje()       { calAtual = new Date(); renderCalendario(); }
function aplicarSelecao() {
  const m = parseInt(document.getElementById("selectMes").value);
  const a = parseInt(document.getElementById("inputAno").value);
  if (!isNaN(m) && !isNaN(a) && a>=2020 && a<=2040) {
    calAtual = new Date(a, m, 1);
    renderCalendario();
  }
}

/* ════ MODAL AGENDAR ════ */
function abrirModalAgendar() {
  horarioSel = null;
  document.getElementById("dataAgendar").value = "";
  document.getElementById("respAgendar").value = "";
  document.getElementById("obsAgendar").value  = "";
  document.getElementById("horariosGrid").innerHTML =
    `<div style="grid-column:span 4;color:var(--muted);font-size:13px;padding:6px 0;">Selecione uma data primeiro</div>`;
  document.getElementById("modalAgendar").classList.add("open");
}

function abrirModalAgendarDia(dataStr) {
  abrirModalAgendar();
  setTimeout(() => {
    document.getElementById("dataAgendar").value = dataStr;
    carregarHorarios();
  }, 60);
}

async function carregarHorarios() {
  const data = document.getElementById("dataAgendar").value;
  if (!data) return;
  horarioSel = null;
  const grid = document.getElementById("horariosGrid");
  grid.innerHTML = `<div style="grid-column:span 4;color:var(--muted);font-size:13px;">Verificando disponibilidade…</div>`;

  try {
    const [a,m,d] = data.split("-");
    const lista = await buscarEntrevistasMes(Number(m), Number(a));
    const ocupados = new Set(
      lista.filter(e => {
        const dt = new Date(e.data_hora);
        return dt.getDate()===Number(d) && e.status!=="reprovado";
      }).map(e => new Date(e.data_hora).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}))
    );

    grid.innerHTML = HORARIOS.map(h => {
      const ocup = ocupados.has(h);
      return `<button class="btn-horario ${ocup?"ocupado":""}"
        ${ocup ? `disabled title="Ocupado"` : `onclick="selHorario(this,'${h}')"`}>
        ${h}${ocup ? "<br><small style='font-size:9px'>ocupado</small>" : ""}
      </button>`;
    }).join("");
  } catch {
    grid.innerHTML = `<div style="grid-column:span 4;color:var(--danger);font-size:13px;">Erro ao verificar horários.</div>`;
  }
}

function selHorario(btn, h) {
  document.querySelectorAll(".btn-horario").forEach(b => b.classList.remove("selecionado"));
  btn.classList.add("selecionado");
  horarioSel = h;
}

async function confirmarAgendamento() {
  const candidatoId = document.getElementById("selectCand").value;
  const data        = document.getElementById("dataAgendar").value;
  const resp        = document.getElementById("respAgendar").value;
  const obs         = document.getElementById("obsAgendar").value;

  if (!candidatoId) { mostrarToast("Selecione um candidato.", "warning"); return; }
  if (!data)        { mostrarToast("Selecione uma data.", "warning"); return; }
  if (!horarioSel)  { mostrarToast("Selecione um horário.", "warning"); return; }

  const btn = document.getElementById("btnConfirmar");
  btn.disabled = true; btn.textContent = "Agendando…";

  try {
    const res = await fetch("/api/entrevistas", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        candidato_id: Number(candidatoId),
        data_hora: `${data}T${horarioSel}:00`,
        responsavel: resp,
        observacoes: obs
      })
    });
    const json = await res.json();
    if (!res.ok) { mostrarToast(json.error||"Erro ao agendar.", "danger"); return; }
    fecharModal("modalAgendar");
    mostrarToast("Entrevista agendada! ✅", "success");
    await Promise.all([buscarCandidatos(), buscarTodasEntrevistas()]);
    renderCards(); renderKanban();
    if (document.getElementById("secao-calendario").style.display !== "none") renderCalendario();
  } catch { mostrarToast("Erro de conexão.", "danger"); }
  finally { btn.disabled = false; btn.textContent = "✓ Confirmar Agendamento"; }
}

/* ════ MODAL DETALHE ════ */
function abrirDetalhe(e) {
  if (typeof e === "string") e = JSON.parse(e);
  const dt    = new Date(e.data_hora);
  const dtLg  = dt.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
  const hrStr = dt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

  document.getElementById("detTitulo").textContent = e.candidato_nome;
  document.getElementById("detSub").textContent    = `${e.cargo} • ${e.unidade}`;

  const botoes = {
    agendada:  `<button class="btn btn-outline" onclick="mudarStatus(${e.id},'realizada');fecharModal('modalDetalhe')">📝 Marcar realizada</button>
                <button class="btn btn-danger-sm" onclick="excluir(${e.id});fecharModal('modalDetalhe')">🗑 Cancelar</button>`,
    realizada: `<button class="btn btn-success-sm" onclick="mudarStatus(${e.id},'aprovado');fecharModal('modalDetalhe')">✅ Aprovar</button>
                <button class="btn btn-danger-sm"  onclick="mudarStatus(${e.id},'reprovado');fecharModal('modalDetalhe')">✕ Reprovar</button>`,
  }[e.status] || "";

  document.getElementById("detConteudo").innerHTML = `
    <div class="detalhe-row"><span class="detalhe-icon">📅</span><div><div class="detalhe-label">Data</div><div class="detalhe-valor">${dtLg}</div></div></div>
    <div class="detalhe-row"><span class="detalhe-icon">🕐</span><div><div class="detalhe-label">Horário</div><div class="detalhe-valor">${hrStr}</div></div></div>
    <div class="detalhe-row"><span class="detalhe-icon">💼</span><div><div class="detalhe-label">Cargo</div><div class="detalhe-valor">${e.cargo}</div></div></div>
    <div class="detalhe-row"><span class="detalhe-icon">📍</span><div><div class="detalhe-label">Unidade</div><div class="detalhe-valor">${e.unidade} — ${e.instituicao}</div></div></div>
    ${e.responsavel?`<div class="detalhe-row"><span class="detalhe-icon">👤</span><div><div class="detalhe-label">Responsável</div><div class="detalhe-valor">${e.responsavel}</div></div></div>`:""}
    ${e.observacoes?`<div class="detalhe-row"><span class="detalhe-icon">📝</span><div><div class="detalhe-label">Observações</div><div class="detalhe-valor">${e.observacoes}</div></div></div>`:""}
    <div class="detalhe-row"><span class="detalhe-icon">🔖</span><div><div class="detalhe-label">Status</div><div class="detalhe-valor"><span class="badge-status badge-${e.status}">${labelSt(e.status)}</span></div></div></div>
    ${botoes?`<div class="detalhe-actions">${botoes}</div>`:""}`;

  document.getElementById("modalDetalhe").classList.add("open");
}

/* ════ AÇÕES ════ */
async function mudarStatus(id, novoStatus) {
  try {
    await fetch("/api/entrevistas", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id, status: novoStatus })
    });
    const msgs = { realizada:"Marcada como realizada!", aprovado:"Candidato aprovado! ✅", reprovado:"Candidato reprovado." };
    mostrarToast(msgs[novoStatus]||"Atualizado!", novoStatus==="aprovado"?"success":"");
    await Promise.all([buscarCandidatos(), buscarTodasEntrevistas()]);
    renderCards(); renderKanban();
    if (document.getElementById("secao-calendario").style.display !== "none") renderCalendario();
  } catch { mostrarToast("Erro ao atualizar.", "danger"); }
}

async function excluir(id) {
  if (!confirm("Cancelar esta entrevista?")) return;
  try {
    await fetch(`/api/entrevistas?id=${id}`, { method: "DELETE" });
    mostrarToast("Entrevista cancelada.");
    await Promise.all([buscarCandidatos(), buscarTodasEntrevistas()]);
    renderCards(); renderKanban();
    if (document.getElementById("secao-calendario").style.display !== "none") renderCalendario();
  } catch { mostrarToast("Erro.", "danger"); }
}

/* ════ UI ════ */
function mostrarSecao(s, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("secao-kanban").style.display    = s==="kanban"    ? "block" : "none";
  document.getElementById("secao-calendario").style.display = s==="calendario" ? "block" : "none";
  if (s === "calendario") renderCalendario();
}

function fecharModal(id) { document.getElementById(id).classList.remove("open"); }
window.addEventListener("click", e => {
  ["modalAgendar","modalDetalhe"].forEach(id => { if(e.target.id===id) fecharModal(id); });
});

function mostrarToast(msg, tipo="") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = `toast ${tipo} show`;
  setTimeout(() => t.classList.remove("show"), 3500);
}

inicializar();
</script>
