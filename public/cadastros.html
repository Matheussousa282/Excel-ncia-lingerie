<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RH | Gestão de Cargos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2563eb;
  --primary-light: #eff6ff;
  --success: #16a34a;
  --success-bg: #f0fdf4;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --muted: #6b7280;
  --bg: #f3f4f6;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #111827;
  --text-secondary: #4a5568;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "DM Sans", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 28px 24px;
}

.page-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.4px;
  margin-bottom: 22px;
}
.page-title span { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 8px; vertical-align: middle; }

/* ── CARD ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  margin-bottom: 20px;
  overflow: hidden;
}

.card-header {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  background: #fafafa;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-body { padding: 20px 22px; }

/* ── FORM NOVO CARGO ── */
.form-novo {
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

.field { flex: 1; }

.field label {
  display: block;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 6px;
}

input[type="text"] {
  width: 100%;
  padding: 10px 14px;
  font-size: 14px;
  font-family: "DM Sans", sans-serif;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  transition: all 0.2s;
  outline: none;
}

input[type="text"]:focus {
  border-color: var(--primary);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}

input[type="text"]::placeholder { color: #b0b7c3; }

/* ── BOTÕES ── */
.btn {
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  font-weight: 600;
  font-size: 13.5px;
  font-family: "DM Sans", sans-serif;
  transition: all 0.18s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}

.btn-primary  { background: var(--primary); color: #fff; }
.btn-primary:hover  { background: #1d4ed8; transform: translateY(-1px); }

.btn-danger   { background: var(--danger-bg); color: var(--danger); border: 1px solid #fecaca; }
.btn-danger:hover   { background: #fee2e2; }

.btn-success  { background: var(--success-bg); color: var(--success); border: 1px solid #bbf7d0; }
.btn-success:hover  { background: #dcfce7; }

.btn-sm { padding: 6px 12px; font-size: 12.5px; }

/* ── TABELA ── */
table { width: 100%; border-collapse: collapse; }

th {
  padding: 11px 16px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  background: #f8fafc;
  border-bottom: 1px solid var(--border);
  text-align: left;
}

td {
  padding: 13px 16px;
  font-size: 14px;
  border-bottom: 1px solid #f0f4f8;
  vertical-align: middle;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #f8fbff; }

/* Input inline na tabela */
.input-inline {
  padding: 7px 11px;
  font-size: 13.5px;
  font-family: "DM Sans", sans-serif;
  border: 1.5px solid transparent;
  border-radius: 6px;
  background: transparent;
  color: var(--text);
  width: 100%;
  max-width: 320px;
  transition: all 0.2s;
  outline: none;
}

.input-inline:hover { border-color: var(--border); background: var(--bg); }
.input-inline:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

/* Badges */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.badge-ativo   { background: var(--success-bg); color: var(--success); }
.badge-inativo { background: #f3f4f6; color: var(--muted); }

.actions { display: flex; gap: 6px; align-items: center; }

/* Contagem */
.count-badge {
  background: var(--primary-light);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  padding: 2px 9px;
  border-radius: 12px;
  margin-left: auto;
}

/* Toast */
.toast {
  position: fixed; bottom: 22px; right: 22px;
  background: #1a202c; color: #fff;
  padding: 11px 18px; border-radius: 9px;
  font-size: 13.5px; font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  z-index: 9999;
  transform: translateY(60px); opacity: 0;
  transition: all 0.3s ease;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: var(--success); }
.toast.danger  { background: var(--danger); }

/* Empty state */
.empty { padding: 40px; text-align: center; color: var(--muted); }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="page-title">
  Gestão de Cargos
</div>

<!-- Formulário novo cargo -->
<div class="card">
  <div class="card-header">
    ➕ Novo Cargo
  </div>
  <div class="card-body">
    <div class="form-novo">
      <div class="field">
        <label for="nome">Nome do cargo</label>
        <input type="text" id="nome" placeholder="Ex: Analista de RH, Gerente de Loja…"
          onkeydown="if(event.key==='Enter') salvar()">
      </div>
      <button class="btn btn-primary" onclick="salvar()">✓ Salvar</button>
    </div>
  </div>
</div>

<!-- Lista de cargos -->
<div class="card">
  <div class="card-header">
    📋 Cargos Cadastrados
    <span class="count-badge" id="countBadge">0</span>
  </div>

  <table>
    <thead>
      <tr>
        <th>Nome do cargo</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script>
/*
  GUARD DE LOGIN — descomente para ativar proteção por login.
  Quando ativa, redireciona para login.html se não houver
  usuário salvo no localStorage.
*/

const usuario = localStorage.getItem("usuario");
if (!usuario) { window.location.href = "login.html"; }


/* ── Carrega lista de cargos ── */
async function carregar() {
  try {
    const res  = await fetch("/api/cargos");
    const data = await res.json();
    const lista = document.getElementById("lista");

    document.getElementById("countBadge").textContent = data.length;

    if (!data.length) {
      lista.innerHTML = `<tr><td colspan="3">
        <div class="empty">
          <div class="empty-icon">📭</div>
          <div>Nenhum cargo cadastrado ainda</div>
        </div>
      </td></tr>`;
      return;
    }

    lista.innerHTML = data.map(c => `
      <tr>
        <td>
          <input class="input-inline" value="${c.nome}"
            title="Clique para editar"
            onchange="editar(${c.id}, this.value, ${c.ativo})">
        </td>
        <td>
          <span class="badge ${c.ativo ? "badge-ativo" : "badge-inativo"}">
            ${c.ativo ? "✓ Ativo" : "✕ Inativo"}
          </span>
        </td>
        <td class="actions">
          ${c.ativo
            ? `<button class="btn btn-danger btn-sm" onclick="alterarStatus(${c.id}, '${c.nome}', false)">Inativar</button>`
            : `<button class="btn btn-success btn-sm" onclick="alterarStatus(${c.id}, '${c.nome}', true)">Ativar</button>`
          }
        </td>
      </tr>
    `).join("");

  } catch (err) {
    console.error(err);
    mostrarToast("Erro ao carregar cargos.", "danger");
  }
}

/* ── Salva novo cargo ── */
async function salvar() {
  const input = document.getElementById("nome");
  if (!input.value.trim()) {
    input.focus();
    return;
  }

  try {
    await fetch("/api/cargos", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nome: input.value.trim() })
    });
    input.value = "";
    carregar();
    mostrarToast("Cargo cadastrado!", "success");
  } catch (err) {
    mostrarToast("Erro ao salvar.", "danger");
  }
}

/* ── Edita nome inline ── */
async function editar(id, nome, ativo) {
  try {
    await fetch("/api/cargos", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id, nome, ativo })
    });
    mostrarToast("Nome atualizado!", "success");
  } catch (err) {
    mostrarToast("Erro ao editar.", "danger");
  }
}

/* ── Ativar / Inativar ── */
async function alterarStatus(id, nome, ativo) {
  try {
    await fetch("/api/cargos", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id, nome, ativo })
    });
    carregar();
    mostrarToast(ativo ? "Cargo ativado!" : "Cargo inativado.", ativo ? "success" : "");
  } catch (err) {
    mostrarToast("Erro ao alterar status.", "danger");
  }
}

/* ── Toast ── */
function mostrarToast(msg, tipo = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${tipo} show`;
  setTimeout(() => t.classList.remove("show"), 3000);
}

/* ── Logout ── */
function logout() {
  localStorage.removeItem("usuario");
  window.location.href = "login.html";
}

carregar();
</script>

</body>
</html>
